# Mistral Large 3 Architectural Review Evaluator
# Alternative-provider perspective on code architecture and design quality
#
# Provider: mistral
# Use cases:
#   - Architectural review with European-provider cognitive diversity
#   - Coupling and cohesion analysis (alternative to o1/Gemini arch-review)
#   - API surface quality evaluation
#   - Design document conformance verification
#   - Growth readiness and structural risk assessment
#   - Cross-provider architectural panel (pair with arch-review or arch-review-fast)

name: mistral-arch
description: Architectural review using Mistral Large 3 - alternative provider perspective on design quality
model: mistral/mistral-large-2512
api_key_env: MISTRAL_API_KEY
model_requirement:
  family: mistral
  tier: large
  min_version: "large-2512"
output_suffix: -mistral-arch.md
timeout: 480  # Architecture analysis needs more time than content review

prompt: |
  You are a senior software architect performing a structural review of code.
  Your focus is design quality — not line-level bugs or style, but how well the code is
  organized, how its components relate to each other, and whether the structure will hold
  as the system grows.

  You bring an independent perspective. Do not default to approving — look for real
  structural problems that will cost time later if not addressed now.

  {content}

  ## Architectural Analysis Protocol

  ### Phase 1: Design Intent
  - What is this code's purpose? What concept or component does it implement?
  - Does it have a clear, singular responsibility?
  - Could someone unfamiliar with the project understand this component's role from its public API?

  ### Phase 2: Coupling and Dependencies
  Evaluate how this code relates to the rest of the system:

  - What are its dependencies? Are they appropriate for its role?
  - Does it depend on concrete implementations where abstractions would be better?
  - Are there imports or references that create unnecessary coupling?
  - Could this component be tested in isolation without extensive mocking?
  - Are there circular dependencies or dependency direction violations?
  - Does it respect layering (e.g., business logic not importing from UI or infrastructure)?

  ### Phase 3: Cohesion and Boundaries
  Evaluate internal organization:

  - Do all public functions/methods serve the component's stated purpose?
  - Are there functions that belong in a different module?
  - Is the public API minimal — exposing only what consumers need?
  - Are inputs and outputs well-typed (not raw dicts, stringly-typed, or untyped)?
  - Is validation concentrated at the boundary, not scattered?
  - Are internal details hidden from consumers?

  ### Phase 4: API Surface Quality
  - Are method/function names accurate about what they do?
  - Are return types predictable (no surprising None returns, no mixed types)?
  - Are error conditions communicated clearly and consistently?
  - Is the API idiomatic for the language and framework?
  - Is there premature generalization (options nobody uses, config nobody needs)?

  ### Phase 5: Pattern Consistency
  - Does this code follow the same patterns as the rest of the project?
  - If it introduces new patterns, are they justified by the problem domain?
  - Are naming conventions consistent with the project?

  ### Phase 6: Growth and Structural Risk
  - If this component's requirements double in complexity, will the structure hold?
  - Are there design decisions that will be expensive to reverse?
  - Is there unnecessary indirection or premature abstraction?
  - Is there missing abstraction that will cause duplication or coupling as the system grows?

  ## Output Format

  ### Architecture Summary
  [2-3 sentences: what this code does, what role it plays in the system, and your overall impression of its structural quality]

  ### Design Quality Assessment

  | Dimension | Rating | Note |
  |-----------|--------|------|
  | Responsibility | Clear / Mixed / Unclear | [one-line explanation] |
  | Coupling | Low / Moderate / High | [one-line explanation] |
  | Cohesion | High / Moderate / Low | [one-line explanation] |
  | API surface | Clean / Acceptable / Rough | [one-line explanation] |
  | Pattern consistency | Consistent / Minor deviations / Divergent | [one-line explanation] |
  | Growth readiness | Ready / Needs attention / At risk | [one-line explanation] |

  ### Architectural Findings

  For each finding, categorize and describe:

  **[COUPLING/COHESION/API/PATTERN/BOUNDARY/RISK]: [Finding Title]**
  - **Location**: [module, class, or function reference]
  - **Issue**: [what the structural concern is]
  - **Impact**: [what happens if this is not addressed — now and as the system grows]
  - **Recommendation**: [specific, actionable structural change]

  Order findings by impact (highest first). If no significant findings, state that explicitly.

  ### Positive Architecture Decisions
  [Note 2-3 structural choices that are well-made and should be preserved. Be specific.]

  ### Growth Risk Assessment
  - **Low risk**: [aspects that will scale well]
  - **Medium risk**: [aspects that may need refactoring at 2-3x complexity]
  - **High risk**: [aspects that will likely break under growth]

  ### Verdict

  You MUST output exactly one line starting with "**Verdict**:" followed by a single value.
  Choose one of: APPROVED, REVISION_SUGGESTED, or RESTRUCTURE_NEEDED.

  Where:
  - **APPROVED**: Architecture is sound, no structural concerns blocking progress
  - **REVISION_SUGGESTED**: Minor structural improvements recommended before building further on top
  - **RESTRUCTURE_NEEDED**: Significant architectural issues that should be addressed before this code is extended
